services:
  spark-master:
    image: spark:python3-java17
    container_name: spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "7077:7077"   # master RPC endpoint (spark://spark-master:7077)
      - "8080:8080"   # master web UI
      - "4040:4040"   # driver/application UI - lives here since we spark-submit *inside* this container
    volumes:
      - ./data:/opt/spark/work-dir/data   # shared dataset dir - must match DATA_DIR in the scripts
      - ./apps:/opt/spark/work-dir/apps   # put generate_data.py / smj_*.py here
    environment:
      SPARK_NO_DAEMONIZE: "true"

  spark-worker-1:
    image: spark:python3-java17
    container_name: spark-worker-1
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      - spark-master
    ports:
      - "8081:8081"   # worker web UI
    volumes:
      - ./data:/opt/spark/work-dir/data
      - ./apps:/opt/spark/work-dir/apps
    environment:
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_MEMORY: "3g"
      SPARK_NO_DAEMONIZE: "true"

  spark-history:
    image: spark:python3-java17
    container_name: spark-history
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.history.HistoryServer"]
    ports:
      - "18080:18080"
    volumes:
      - ./data:/opt/spark/work-dir/data
    environment:
      SPARK_HISTORY_OPTS: "-Dspark.history.fs.logDirectory=file:/opt/spark/work-dir/data/spark-events"

  spark-worker-2:
    image: spark:python3-java17
    container_name: spark-worker-2
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      - spark-master
    ports:
      - "8082:8081"   # host 8082 -> container 8081 (avoids clashing with worker-1)
    volumes:
      - ./data:/opt/spark/work-dir/data
      - ./apps:/opt/spark/work-dir/apps
    environment:
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_MEMORY: "3g"
      SPARK_NO_DAEMONIZE: "true"